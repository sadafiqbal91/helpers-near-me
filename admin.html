<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Helpers Near Me</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <!-- Reusing global tokens -->
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="mesh-bg">
        <div class="mesh-sphere"></div>
        <div class="mesh-sphere sphere-2"></div>

        <!-- High Density Animated Nodes (Constellations) - Clustered -->
        <div class="diamond-node" style="top: 10%; left: 5%; animation-delay: 0s;"></div>
        <div class="diamond-node" style="top: 12%; left: 8%; animation-delay: 0.5s;"></div>
        <div class="diamond-node" style="top: 30%; left: 90%; animation-delay: 1.2s;"></div>
        <div class="diamond-node" style="top: 32%; left: 88%; animation-delay: 1.8s;"></div>
        <div class="diamond-node" style="top: 60%; left: 15%; animation-delay: 2.5s;"></div>
        <div class="diamond-node" style="top: 63%; left: 18%; animation-delay: 3s;"></div>
        <div class="diamond-node" style="top: 80%; left: 70%; animation-delay: 0.8s;"></div>
        <div class="diamond-node" style="top: 78%; left: 73%; animation-delay: 1.5s;"></div>
        <div class="diamond-node" style="top: 45%; left: 50%; animation-delay: 2s;"></div>
        <div class="diamond-node" style="top: 15%; left: 40%; animation-delay: 0.4s;"></div>
        <div class="diamond-node" style="top: 70%; left: 30%; animation-delay: 2.2s;"></div>
        <div class="diamond-node" style="top: 20%; left: 75%; animation-delay: 1.1s;"></div>
    </div>

    <!-- Login Section -->
    <div id="login-section" class="login-wrapper">
        <div class="login-card">
            <h2>Admin Login</h2>
            <form id="admin-login-form">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="login-username" required />
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required />
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
            </form>
        </div>
    </div>

    <!-- Main Dashboard Section (Hidden until logged in) -->
    <div id="dashboard-wrapper" class="hidden">
        <nav class="admin-nav">
            <h1>Helpers Near Me <span>Admin</span></h1>
            <div class="nav-links">
                <button id="logout-btn" class="btn-primary" style="background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-right: 15px;">Logout</button>
                <a href="index.html">Back to Site</a>
            </div>
        </nav>

        <div class="admin-container">
        
        <!-- Sidebar/Tabs -->
        <aside class="admin-sidebar">
            <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
            <button class="tab-btn" data-tab="workers">👥 Manage Workers</button>
            <button class="tab-btn" data-tab="bookings">📅 View Bookings</button>
            <button class="tab-btn" id="seed-btn">🌱 Seed Database</button>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            
            <!-- Dashboard Tab -->
            <section id="dashboard" class="tab-content active">
                <h2>Overview</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Workers</h3>
                        <p id="total-workers">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Bookings</h3>
                        <p id="total-bookings">0</p>
                    </div>
                </div>
            </section>

            <!-- Workers Tab -->
            <section id="workers" class="tab-content">
                <div class="header-flex">
                    <h2>Manage Workers</h2>
                    <button class="btn-primary" onclick="toggleWorkerForm()">+ Add New Worker</button>
                </div>
                
                <div id="add-worker-form" class="hidden form-card">
                    <h3>Add Worker</h3>
                    <form id="new-worker-form">
                        <div class="input-group">
                            <label>Name</label>
                            <input type="text" id="w-name" required>
                        </div>
                        <div class="input-group">
                            <label>Category</label>
                            <select id="w-category" required>
                                <option value="Domestic Workers">Domestic Workers</option>
                                <option value="Office Helpers">Office Helpers</option>
                                <option value="Permanent Drivers">Permanent Drivers</option>
                                <option value="Healthcare Workers">Healthcare Workers</option>
                                <option value="Store Helpers">Store Helpers</option>
                                <option value="Factory Workers">Factory Workers</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Experience (e.g. 5 Years)</label>
                            <input type="text" id="w-exp" required>
                        </div>
                        <div class="input-group">
                            <label>Skills (comma separated)</label>
                            <input type="text" id="w-skills">
                        </div>
                        <button type="submit" class="btn-primary">Save Worker</button>
                    </form>
                </div>

                <div class="table-container">
                    <table id="workers-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Experience</th>
                                <th>Rating</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Bookings Tab -->
            <section id="bookings" class="tab-content">
                <h2>Recent Bookings</h2>
                <div class="table-container">
                    <table id="bookings-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Client Name</th>
                                <th>Phone</th>
                                <th>Category Requested</th>
                                <th>Location</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>
    </div> <!-- Dasboard Wrapper Ends Here -->

    <!-- JS -->
    <script type="module" src="admin.js"></script>
</body>
</html>
