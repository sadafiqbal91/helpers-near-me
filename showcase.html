<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Our Professionals - Helpers Near Me</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .showcase-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .video-container {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px var(--accent-glow);
            position: relative;
            margin-bottom: 2rem;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .showcase-header {
            margin-bottom: 3rem;
        }

        .showcase-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .back-home:hover {
            color: var(--accent);
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <!-- Global Premium Background -->
    <div class="mesh-bg">
        <div class="mesh-sphere"></div>
        <div class="mesh-sphere sphere-2"></div>
        
        <!-- High Density Animated Nodes (Constellations) -->
        <div class="diamond-node" style="top: 10%; left: 10%; animation-delay: 0s;"></div>
        <div class="diamond-node purple" style="top: 12%; left: 13%; animation-delay: 0.3s;"></div>
        <div class="diamond-node purple" style="top: 30%; left: 45%; animation-delay: 0.2s;"></div>
        <div class="diamond-node" style="top: 15%; left: 80%; animation-delay: 0.5s;"></div>
        <div class="diamond-node purple" style="top: 50%; left: 5%; animation-delay: 0.9s;"></div>
        <div class="diamond-node purple" style="top: 80%; left: 15%; animation-delay: 1.1s;"></div>
        <div class="diamond-node" style="top: 75%; left: 85%; animation-delay: 2.5s;"></div>
        <div class="diamond-node purple" style="top: 25%; left: 25%; animation-delay: 3s;"></div>
    </div>

    <div class="showcase-wrapper">
        <div class="container">
            <a href="index.html" class="back-home">
                <i class="ri-arrow-left-line"></i> Back to Home
            </a>

            <div class="showcase-header" style="margin-top: 2rem;">
                <span class="hero-tagline">Excellence in Every Field</span>
                <h1>Meet the Faces of <span style="color: var(--accent);">HelpersNearMe</span></h1>
                <p style="color: var(--text-secondary); max-width: 600px; margin: 0 auto;">Watch our dedicated professionals in action. From domestic support to specialized technical help, we bring expert care to your doorstep.</p>
            </div>

            <div class="video-container">
                <video autoplay muted loop playsinline poster="https://images.unsplash.com/photo-1521737711867-e3b97375f902?auto=format&fit=crop&q=80&w=1200">
                    <source src="https://assets.mixkit.co/videos/preview/mixkit-group-of-professionals-working-at-a-startup-40342-large.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <div style="margin-top: 1rem;">
                <a href="index.html#registry" class="btn-primary">Browse All Specialists</a>
            </div>
        </div>
    </div>

</body>
</html>
